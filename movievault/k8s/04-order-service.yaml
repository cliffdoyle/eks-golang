apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: movievault
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: 100984278168.dkr.ecr.us-east-1.amazonaws.com/movievault/order-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: DB_HOST
              value: postgres.movievault.svc.cluster.local
            - name: DB_NAME
              value: movievault
            - name: DB_USER
              value: appuser
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: KAFKA_BROKERS
              value: kafka.movievault.svc.cluster.local:9092
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: movievault
spec:
  type: LoadBalancer
  selector:
    app: order-service
  ports:
    - port: 80
      targetPort: 8081

