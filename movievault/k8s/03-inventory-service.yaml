apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: movievault
spec:
  replicas: 2          # Run 2 copies for high availability
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          # Replace 100984278168 with your AWS account ID
          image: 100984278168.dkr.ecr.us-east-1.amazonaws.com/movievault/inventory-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: postgres.movievault.svc.cluster.local
            - name: DB_NAME
              value: movievault
            - name: DB_USER
              value: appuser
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: KAFKA_BROKERS
              value: kafka.movievault.svc.cluster.local:9092
          # ── Health checks ──
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          # ── Resource limits ──
          resources:
            requests:
              cpu: 100m       # 0.1 CPU
              memory: 128Mi
            limits:
              cpu: 500m       # 0.5 CPU max
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: movievault
spec:
  type: LoadBalancer     # Creates an AWS ALB for external access
  selector:
    app: inventory-service
  ports:
    - port: 80
      targetPort: 8080
 

