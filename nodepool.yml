# nodepool.yaml
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: movie-app-nodes
spec:
  template:
    spec:
      nodeClassRef:
        group: eks.amazonaws.com
        kind: NodeClass
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: [amd64]
        - key: karpenter.sh/capacity-type
          operator: In
          values: [on-demand]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: [t3.medium, t3.large]   # Change to larger if needed
  limits:
    cpu: 12         # Max 12 CPUs total across all nodes
    memory: 24Gi    # Max 24GB RAM total
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s

